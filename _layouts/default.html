<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f6f8fa">
    <meta name="color-scheme" content="light dark">
    {% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <link rel="stylesheet" href="{{ "/assets/css/components/command-center.css?v=" | append: site.github.build_revision | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% include head-custom.html %}
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="site-brand">
          <a class="site-title" href="{{ "/" | relative_url }}">{{ site.title }}</a>
          <p>{{ site.description }}</p>
        </div>

        <nav class="main-nav" aria-label="Primary navigation">
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/work-map">Work Map</a></li>
            <li><a href="/projects">Projects</a></li>
            <li><a href="/notes">Notes</a></li>
            <li><a href="/about">About</a></li>
          </ul>
        </nav>
      </header>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div>
          <strong>Suleman Manji</strong>
          <span>Proof-gated AI operations, MSP systems engineering, and agent runtime infrastructure.</span>
        </div>
        <nav aria-label="Footer links">
          <a href="mailto:{{ site.email }}">Email</a>
          <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
          <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener">LinkedIn</a>
          <a href="https://www.npmjs.com/~sullyman" target="_blank" rel="noopener">npm</a>
        </nav>
      </footer>
    </div>
  </body>
</html>
